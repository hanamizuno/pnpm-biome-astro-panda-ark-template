repos:
  - repo: local
    hooks:
      - id: biome-check
        name: biome check (staged)
        # staged ファイルだけにフォーマット + lint を当てる (.astro は types_or で除外)
        entry: pnpm biome check --no-errors-on-unmatched
        language: system
        types_or: [ts, tsx, javascript, jsx, json, jsonc]
        pass_filenames: true
      - id: typecheck
        name: astro check
        # `pnpm typecheck` は `astro check` のエイリアス。プロジェクト全体を検査する
        entry: pnpm typecheck
        language: system
        pass_filenames: false
        files: \.(ts|tsx|astro)$
      - id: secretlint
        name: secretlint (staged)
        entry: pnpm exec secretlint --no-color
        language: system
        pass_filenames: true
