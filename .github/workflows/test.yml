name: Test and Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        # 24 = 現行 LTS、25 = current (odd release)
        node-version: [24, 25]

    env:
      FORCE_COLOR: "0"
      NO_COLOR: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        id: coverage
        run: |
          {
            echo "report<<EOF"
            pnpm test:cov 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build (Astro)
        run: pnpm build

      - name: Upload coverage report
        # 1 マトリクスのみアップロード（メイン LTS）
        if: matrix.node-version == 24
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/

      - name: Add comment to PR
        if: github.event_name == 'pull_request' && matrix.node-version == 24
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          COVERAGE_REPORT: ${{ steps.coverage.outputs.report }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const report = (process.env.COVERAGE_REPORT || "").trim();

            const runURL = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const downloadLink = `[HTMLレポートをArtifactsからダウンロード](${runURL})`;

            const reportSection = report
              ? `\n\n\`\`\`\n${report}\n\`\`\``
              : "\n\nカバレッジデータがありません。";
            const marker = "## テストカバレッジレポート";
            const body = `${marker}\n\n${downloadLink}${reportSection}`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c =>
              c.user?.login === "github-actions[bot]" && (c.body ?? "").startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
