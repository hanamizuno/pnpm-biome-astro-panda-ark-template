name: Label PRs

on:
  pull_request:
    branches: [main]
    # デフォルトの types を明示。`edited` は意図的に除外:
    # タイトル・本文の編集では変更ファイルの集合が変わらないため。
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    # fork からの PR では GITHUB_TOKEN が read-only のため、ラベル付与が 403 で失敗する。
    # `pull_request_target`（zizmor が dangerous trigger として警告する）ではなく
    # `pull_request` を使い、fork からの PR はラベル無しを許容する。
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Apply path-based labels
        # checkout 不要: labeler は .github/labeler.yml を API 経由で読む
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          sync-labels: true
