# actions/labeler の設定（.github/workflows/label_pr.yml から実行される）。
# アプリケーションコードではなく開発ハーネス（エージェント向け指示、CI、
# コンテナ、ツーリング設定）を変更する PR にラベルを付ける。
#
# 注意: labeler の `dot` オプションはデフォルト true のため、.github/ や
# .devcontainer/ のような dot 始まりのパスも特別扱いなしでマッチする。
# 意図的な除外: pnpm-lock.yaml（定常的な依存更新のため）、.nvmrc（Node の
# 更新は必ず Dockerfile 等を同時に触るため単独でマッチさせる必要がない）。

meta:
  - changed-files:
      - any-glob-to-any-file:
          # エージェント / コントリビューター向け指示
          - "AGENTS.md"
          - "CLAUDE.md"
          # GitHub 設定（workflows、テンプレート、copilot-instructions.md、このファイル）
          - ".github/**"
          # コンテナ
          - "Dockerfile"
          - ".dockerignore"
          - "compose.yml"
          - "compose.dev.yml"
          - ".devcontainer/**"
          # ツーリング / エディタ設定
          - "package.json"
          - "pnpm-workspace.yaml"
          - "biome.json"
          - "tsconfig.json"
          - "astro.config.mjs"
          - "panda.config.ts"
          - "postcss.config.cjs"
          - "vitest.config.ts"
          - ".npmrc"
          - ".pre-commit-config.yaml"
          - ".secretlintrc.json"
          - ".secretlintignore"
          - ".zizmor.yml"
          - ".editorconfig"
          - ".gitattributes"
          - ".vscode/**"
