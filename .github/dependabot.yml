version: 2

# npm 依存関係は deps-update.yml が pnpm で扱うため、ここでは扱わない。
# cooldown はリリース直後の供給チェーン攻撃を避けるための待機期間。
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      gh-actions:
        patterns:
          - "*"
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    # Node のメジャー更新は LTS 方針（.nvmrc / Dockerfile の ARG NODE_VERSION /
    # ドキュメントとの同時更新が必要）のため手動で行う。digest・マイナー更新は追跡する。
    ignore:
      - dependency-name: node
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
